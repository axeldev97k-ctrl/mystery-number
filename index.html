<!DOCTYPE html>
<html>
<head>
<title>Dado 3D</title>

<style>
body{
background:#0f172a;
color:white;
font-family:Arial;
text-align:center;
margin-top:80px;
}

.scene{
width:120px;
height:120px;
margin:auto;
perspective:600px;
}

.cube{
width:120px;
height:120px;
position:relative;
transform-style:preserve-3d;
transition: transform 1s;
}

.face{
position:absolute;
width:120px;
height:120px;
background:white;
border:3px solid black;
display:flex;
align-items:center;
justify-content:center;
font-size:40px;
color:black;
}

.front{ transform:rotateY(0deg) translateZ(60px); }
.back{ transform:rotateY(180deg) translateZ(60px); }
.right{ transform:rotateY(90deg) translateZ(60px); }
.left{ transform:rotateY(-90deg) translateZ(60px); }
.top{ transform:rotateX(90deg) translateZ(60px); }
.bottom{ transform:rotateX(-90deg) translateZ(60px); }

button{
margin-top:40px;
padding:15px 40px;
font-size:22px;
border:none;
border-radius:10px;
background:#38bdf8;
color:white;
cursor:pointer;
}

button:hover{
background:#0ea5e9;
}
</style>

</head>

<body>

<h1>🎲 Tirar el Dado</h1>

<div class="scene">
<div class="cube" id="cube">

<div class="face front">⚀</div>
<div class="face back">⚅</div>
<div class="face right">⚂</div>
<div class="face left">⚃</div>
<div class="face top">⚁</div>
<div class="face bottom">⚄</div>

</div>
</div>

<button onclick="rollDice()">Tirar dado</button>

<h2 id="resultado"></h2>

<script>

function rollDice(){

let numero = Math.floor(Math.random()*6)+1;

let cube = document.getElementById("cube");

let rotaciones = {
1:"rotateX(0deg) rotateY(0deg)",
2:"rotateX(-90deg)",
3:"rotateY(-90deg)",
4:"rotateY(90deg)",
5:"rotateX(90deg)",
6:"rotateY(180deg)"
};

cube.style.transform = rotaciones[numero];

document.getElementById("resultado").innerHTML =
"Salió el número: " + numero;

}

</script>

</body>
</html>
