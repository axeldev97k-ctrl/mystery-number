<!DOCTYPE html>
<html>
<head>
<title>Dado 3D</title>

<style>

body{
margin:0;
font-family:Arial;
color:white;
text-align:center;
background:linear-gradient(270deg,#020617,#0f172a,#1e293b);
background-size:400% 400%;
animation:fondo 10s infinite;
}

@keyframes fondo{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

h1{
margin-top:60px;
}

.scene{
width:150px;
height:150px;
margin:80px auto;
perspective:600px;
}

.cube{
width:150px;
height:150px;
position:relative;
transform-style:preserve-3d;
transition:transform 1.2s ease-out;
}

.face{
position:absolute;
width:150px;
height:150px;
background:white;
border:4px solid #ddd;
display:grid;
grid-template-columns:repeat(3,1fr);
grid-template-rows:repeat(3,1fr);
padding:20px;
box-sizing:border-box;
}

.dot{
width:20px;
height:20px;
background:black;
border-radius:50%;
justify-self:center;
align-self:center;
}

.hidden{
visibility:hidden;
}

.front{ transform: rotateY(0deg) translateZ(75px); }
.back{ transform: rotateY(180deg) translateZ(75px); }
.right{ transform: rotateY(90deg) translateZ(75px); }
.left{ transform: rotateY(-90deg) translateZ(75px); }
.top{ transform: rotateX(90deg) translateZ(75px); }
.bottom{ transform: rotateX(-90deg) translateZ(75px); }

button{
padding:15px 40px;
font-size:22px;
border:none;
border-radius:12px;
background:#38bdf8;
color:white;
cursor:pointer;
margin-top:30px;
}

button:hover{
background:#0ea5e9;
}

</style>
</head>

<body>

<h1>🎲 Tirar el Dado</h1>

<div class="scene">
<div class="cube" id="cube">

<div class="face front">
<div class="hidden"></div><div class="hidden"></div><div class="hidden"></div>
<div class="hidden"></div><div class="dot"></div><div class="hidden"></div>
<div class="hidden"></div><div class="hidden"></div><div class="hidden"></div>
</div>

<div class="face back">
<div class="dot"></div><div class="hidden"></div><div class="dot"></div>
<div class="hidden"></div><div class="dot"></div><div class="hidden"></div>
<div class="dot"></div><div class="hidden"></div><div class="dot"></div>
</div>

<div class="face right">
<div class="dot"></div><div class="hidden"></div><div class="dot"></div>
<div class="hidden"></div><div class="hidden"></div><div class="hidden"></div>
<div class="dot"></div><div class="hidden"></div><div class="dot"></div>
</div>

<div class="face left">
<div class="dot"></div><div class="hidden"></div><div class="dot"></div>
<div class="dot"></div><div class="hidden"></div><div class="dot"></div>
<div class="dot"></div><div class="hidden"></div><div class="dot"></div>
</div>

<div class="face top">
<div class="dot"></div><div class="hidden"></div><div class="dot"></div>
<div class="hidden"></div><div class="dot"></div><div class="hidden"></div>
<div class="dot"></div><div class="hidden"></div><div class="dot"></div>
</div>

<div class="face bottom">
<div class="dot"></div><div class="hidden"></div><div class="dot"></div>
<div class="dot"></div><div class="hidden"></div><div class="dot"></div>
<div class="dot"></div><div class="hidden"></div><div class="dot"></div>
</div>

</div>
</div>

<button onclick="roll()">Tirar dado</button>

<h2 id="resultado"></h2>

<audio id="sound">
<source src="https://www.soundjay.com/misc/sounds/dice-roll-1.mp3">
</audio>

<script>

const cube=document.getElementById("cube");

function roll(){

let n=Math.floor(Math.random()*6)+1;

let base={
1:[0,0],
2:[-90,0],
3:[0,90],
4:[0,-90],
5:[90,0],
6:[0,180]
};

let spinX=360*(Math.floor(Math.random()*3)+2);
let spinY=360*(Math.floor(Math.random()*3)+2);

let finalX=spinX+base[n][0];
let finalY=spinY+base[n][1];

cube.style.transform=`rotateX(${finalX}deg) rotateY(${finalY}deg)`;

document.getElementById("resultado").innerHTML="Salió el número: "+n;

document.getElementById("sound").play();

}

</script>

</body>
</html>
