<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dado Aleatorio</title>

<style>

body{
margin:0;
background:black;
color:white;
font-family:Arial;
text-align:center;
overflow:hidden;
}

h1{
margin-top:50px;
}

canvas{
position:fixed;
top:0;
left:0;
z-index:-1;
}

#dice{
width:150px;
height:150px;
background:white;
border:6px solid #ddd;
margin:80px auto;
display:grid;
grid-template-columns:repeat(3,1fr);
grid-template-rows:repeat(3,1fr);
padding:20px;
box-sizing:border-box;
}

.dot{
width:20px;
height:20px;
background:black;
border-radius:50%;
justify-self:center;
align-self:center;
}

.hidden{
visibility:hidden;
}

button{
padding:15px 40px;
font-size:22px;
border:none;
border-radius:12px;
background:#38bdf8;
color:white;
cursor:pointer;
}

button:hover{
background:#0ea5e9;
}

#resultado{
margin-top:20px;
font-size:24px;
}

</style>
</head>

<body>

<canvas id="stars"></canvas>

<h1>🎲 Dado Aleatorio</h1>

<div id="dice"></div>

<button onclick="roll()">Tirar dado</button>

<div id="resultado"></div>

<script>

const dice=document.getElementById("dice");

function crearDado(numero){

dice.innerHTML="";

let posiciones={
1:[4],
2:[0,8],
3:[0,4,8],
4:[0,2,6,8],
5:[0,2,4,6,8],
6:[0,2,3,5,6,8]
};

for(let i=0;i<9;i++){

let dot=document.createElement("div");

if(posiciones[numero].includes(i)){
dot.className="dot";
}else{
dot.className="dot hidden";
}

dice.appendChild(dot);

}

}

function roll(){

let numero=Math.floor(Math.random()*6)+1;

crearDado(numero);

document.getElementById("resultado").innerText=
"Salió el número: "+numero;

}

crearDado(1);


const canvas=document.getElementById("stars");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let stars=[];

for(let i=0;i<150;i++){

stars.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
r:Math.random()*2
});

}

function drawStars(){

ctx.clearRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="white";

stars.forEach(s=>{
ctx.beginPath();
ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
ctx.fill();
});

requestAnimationFrame(drawStars);

}

drawStars();

</script>

</body>
</html>
