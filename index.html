<!DOCTYPE html>
<html>
<head>
<title>Dado Aleatorio</title>

<style>

body{
margin:0;
background:#020617;
color:white;
font-family:Arial;
text-align:center;
overflow:hidden;
}

h1{
position:absolute;
top:20px;
width:100%;
}

button{
position:absolute;
top:80px;
left:50%;
transform:translateX(-50%);
padding:15px 40px;
font-size:22px;
border:none;
border-radius:10px;
background:#38bdf8;
color:white;
cursor:pointer;
}

#resultado{
position:absolute;
top:140px;
width:100%;
font-size:24px;
}

canvas{
display:block;
}

.fire{
box-shadow:
0 0 20px orange,
0 0 40px red,
0 0 60px yellow;
animation:fuego 0.2s infinite alternate;
}

@keyframes fuego{
from{transform:scale(1)}
to{transform:scale(1.1)}
}

.particle{
position:absolute;
width:6px;
height:6px;
background:orange;
border-radius:50%;
pointer-events:none;
}

</style>
</head>

<body>

<h1>🎲 Dado Aleatorio</h1>

<button onclick="tirar()">Tirar dado</button>

<div id="resultado"></div>

<audio id="sound">
<source src="https://www.soundjay.com/misc/sounds/dice-roll-1.mp3">
</audio>

<script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>

<script>

const {Engine,Render,Runner,Bodies,World,Body} = Matter;

const engine = Engine.create();
const world = engine.world;

const render = Render.create({
element: document.body,
engine: engine,
options:{
width: window.innerWidth,
height: window.innerHeight,
wireframes:false,
background:"#020617"
}
});

Render.run(render);
Runner.run(Runner.create(),engine);

const suelo = Bodies.rectangle(window.innerWidth/2,window.innerHeight-10,window.innerWidth,20,{isStatic:true});
const izquierda = Bodies.rectangle(10,window.innerHeight/2,20,window.innerHeight,{isStatic:true});
const derecha = Bodies.rectangle(window.innerWidth-10,window.innerHeight/2,20,window.innerHeight,{isStatic:true});

World.add(world,[suelo,izquierda,derecha]);

let dado;

function tirar(){

if(dado){
World.remove(world,dado);
}

let numero = Math.floor(Math.random()*6)+1;

dado = Bodies.rectangle(
window.innerWidth/2,
200,
80,
80,
{
restitution:0.7,
render:{
fillStyle:"white",
strokeStyle:"black",
lineWidth:2
}
}
);

World.add(world,dado);

Body.setVelocity(dado,{
x:(Math.random()-0.5)*20,
y:-20
});

Body.setAngularVelocity(dado,0.3);

document.getElementById("resultado").innerHTML="Resultado: "+numero;

document.getElementById("sound").play();

if(numero===6){
activarFuego();
}

}

function activarFuego(){

const canvas = render.canvas;

canvas.classList.add("fire");

for(let i=0;i<60;i++){

let p=document.createElement("div");

p.className="particle";

p.style.left=(window.innerWidth/2)+"px";
p.style.top=(window.innerHeight/2)+"px";

document.body.appendChild(p);

let x=(Math.random()-0.5)*600;
let y=(Math.random()-0.5)*600;

p.animate([
{transform:"translate(0,0)",opacity:1},
{transform:`translate(${x}px,${y}px)`,opacity:0}
],{
duration:1200
});

setTimeout(()=>p.remove(),1200);

}

setTimeout(()=>{
canvas.classList.remove("fire");
},1500);

}

</script>

</body>
</html>
