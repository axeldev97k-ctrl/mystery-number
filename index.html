<!DOCTYPE html>
<html>
<head>
<title>Dado</title>

<style>
body{
background:#0f172a;
color:white;
font-family:Arial;
text-align:center;
margin-top:80px;
}

#dice{
font-size:120px;
margin:40px;
transition: transform 0.6s;
}

button{
padding:15px 40px;
font-size:22px;
border:none;
border-radius:10px;
background:#38bdf8;
color:white;
cursor:pointer;
}

button:hover{
background:#0ea5e9;
}
</style>

</head>

<body>

<h1>🎲 Tirar el Dado</h1>

<div id="dice">⚀</div>

<button onclick="rollDice()">Tirar dado</button>

<h2 id="resultado"></h2>

<script>

function rollDice(){

let numero = Math.floor(Math.random()*6)+1;

let dados = ["⚀","⚁","⚂","⚃","⚄","⚅"];

document.getElementById("dice").style.transform="rotate(360deg)";

setTimeout(()=>{
document.getElementById("dice").innerHTML=dados[numero-1];
document.getElementById("resultado").innerHTML="Salió el número: "+numero;
},200);

}

</script>

</body>
</html>
